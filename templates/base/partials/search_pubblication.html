{% load static widget_tweaks %}

<form class="flex lg:w-auto w-full max-w-xs" method="get" role="search">
    {% render_field filter.form.title class="px-3 py-2 h-10 w-full bg-black text-green-400 text-sm border border-[#2a2a2a] border-r-0 focus:outline-none focus:border-red-800 placeholder:text-gray-600 font-mono" placeholder="Consultar arquivo…" %}
    <button type="submit" id="filtrar-btn"
            class="bg-red-900 hover:bg-red-800 px-3 h-10 border border-red-900 focus:outline-none transition"
            aria-label="Pesquisar">
        <i class="text-white fa-solid fa-magnifying-glass text-sm"></i>
    </button>
</form>
