{% load static %}
<!DOCTYPE html>
<html lang="pt-br" class="scroll-smooth">
<head>
    {% include "base/partials/head.html" %}

    <title>{% block title %}{% endblock title %} Blog</title>
</head>
<body class="text-2xl flex flex-col min-h-screen bg-white text-black dark:bg-gray-900 dark:text-white transition-colors duration-300">

    {% include "base/partials/header.html" %}

    <main class="grid grid-cols-1 sm:grid-cols-auto-fit sm:grid-cols-minmax-340px gap-8 p-4">
        {% block content %}
        {% endblock content %}
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
    <script src="{% static "blog/JS/flowbite.min.js" %}"></script>
    <script>
        const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');
        const themeToggleBtn = document.getElementById('theme-toggle');

        if (localStorage.getItem('color-theme') === 'dark' ||
            (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            themeToggleLightIcon.classList.remove('hidden');
        } else {
            document.documentElement.classList.remove('dark');
            themeToggleDarkIcon.classList.remove('hidden');
        }

        themeToggleBtn.addEventListener('click', function () {
            themeToggleDarkIcon.classList.toggle('hidden');
            themeToggleLightIcon.classList.toggle('hidden');

            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            }
        });
    </script>

    <footer class="bg-white text-gray-800 dark:bg-gray-900 dark:text-gray-100 py-4 text-center mt-auto shadow-inner">
        <p>&copy; 2024 Meu Blog. Todos os direitos reservados.</p>
    </footer>    

</body>
</html>
